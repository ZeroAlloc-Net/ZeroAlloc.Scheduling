name: CI

on:
  push:
    branches: [main, 'release-please--**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet tool restore

      - name: Determine version
        id: gitversion
        run: echo "semver=$(dotnet gitversion /output json /showvariable SemVer)" >> "$GITHUB_OUTPUT"

      - run: dotnet restore

      - run: dotnet build -c Release -p:Version=${{ steps.gitversion.outputs.semver }} --no-restore

      - run: dotnet test -c Release --no-build

      - name: Pack
        run: |
          for pkg in ZeroAlloc.Scheduling ZeroAlloc.Scheduling.Generator ZeroAlloc.Scheduling.EfCore \
                     ZeroAlloc.Scheduling.InMemory ZeroAlloc.Scheduling.Redis \
                     ZeroAlloc.Scheduling.Dashboard ZeroAlloc.Scheduling.Dashboard.Blazor \
                     ZeroAlloc.Scheduling.Mediator; do
            dotnet pack src/$pkg/$pkg.csproj -c Release \
              -p:Version=${{ steps.gitversion.outputs.semver }} --no-build -o ./artifacts
          done

      - name: Push to NuGet
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
