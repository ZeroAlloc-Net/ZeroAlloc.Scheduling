name: Trigger Website

on:
  push:
    branches: [main]
    paths: ['docs/**']

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: ZeroAlloc-Net/.website
          event-type: submodule-update
